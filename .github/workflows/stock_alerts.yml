name: Stock Alerts

on:
  schedule:
    - cron: "*/10 * * * 1-5"   # every 10 minutes, Mon–Fri
  workflow_dispatch:

jobs:
  run-alerts:
    runs-on: ubuntu-latest

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      SHEET_CSV_URL: ${{ secrets.SHEET_CSV_URL }}
      SHEET_UPDATE_URL: ${{ secrets.SHEET_UPDATE_URL }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run alert script
        run: |
          python StockAlerts/stock_alerts.py
